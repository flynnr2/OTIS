profile_name: h0_reference
profile_version: 1

hardware_stage: H0
software_stage: SW0

channels:
  - channel_id: 0
    role: generic_pulse
    capture_edges: both

  - channel_id: 1
    role: pps_reference
    capture_edges: rising

  - channel_id: 2
    role: xcxo_observation
    mode: counted

reference:
  type: gnss_pps
  source: adafruit_ultimate_gps

oscillator:
  type: tcxo
  part: ECS-TXO-5032-160-TR
  nominal_hz: 16000000

front_end:
  conditioning: SN74AHCT1G14_experiment
  gpio_assumption: rp2040_3v3_only
